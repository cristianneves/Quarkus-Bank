# --- 1. CONFIGURAï¿½ï¿½ES DE REDE ---
quarkus.http.port=8082
quarkus.devservices.enabled=false

# --- 2. BANCO DE DADOS (CADASTRO_DB - 5432) ---
# --- 2. BANCO DE DADOS ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:5432/cadastro_db
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASS}
quarkus.hibernate-orm.database.generation=none

# ATIVAR o Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1.0.0

# Configuraï¿½ï¿½es de Teste do Banco
%test.quarkus.hibernate-orm.database.generation=none
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.scheduler.enabled=false

# --- 3. MENSAGERIA (KAFKA PRODUCER) ---
kafka.bootstrap.servers=${KAFKA_URL:localhost:9092}

mp.messaging.outgoing.pessoa-registrada.connector=smallrye-kafka
mp.messaging.outgoing.pessoa-registrada.topic=v2-pessoa-registrada
mp.messaging.outgoing.pessoa-registrada.value.serializer=org.apache.kafka.common.serialization.StringSerializer
# IMPORTANTE: No ambiente de teste, usamos o conector em memï¿½ria
%test.mp.messaging.outgoing.pessoa-registrada.connector=smallrye-in-memory

# --- 4. SEGURANï¿½A (OIDC - VALIDAï¿½ï¿½O DE TOKENS) ---
quarkus.oidc.auth-server-url=${KC_URL:http://localhost:8180}/realms/bank-realm
quarkus.oidc.client-id=quarkus-app
quarkus.oidc.application-type=service

# --- 5. KEYCLOAK ADMIN (CRIAï¿½ï¿½O DE USUï¿½RIOS) ---
quarkus.keycloak.admin-client.server-url=${KC_URL:http://localhost:8180}
quarkus.keycloak.admin-client.realm=master
quarkus.keycloak.admin-client.client-id=admin-cli
quarkus.keycloak.admin-client.username=${KC_ADMIN_USER:admin}
quarkus.keycloak.admin-client.password=${KC_ADMIN_PASS:admin}

# Propriedade customizada usada no seu PessoaService.java
br.com.bb.cadastro.keycloak.realm=bank-realm

# --- 6. COMUNICAï¿½ï¿½O ENTRE SERVIï¿½OS (REST CLIENT) ---
br.com.bb.cadastro.client.ContaClient/mp-rest/url=${URL_TRANSF:http://localhost:8083}
br.com.bb.cadastro.client.ContaClient/mp-rest/scope=jakarta.enterprise.context.ApplicationScoped

# --- 7. QUALIDADE E LOGS ---
quarkus.jackson.fail-on-empty-beans=false

quarkus.rest-client.conta-api.url=${URL_TRANSF:http://localhost:8083}/api/contas

# Ativa o JaCoCo no Quarkus
# No seu application.properties
quarkus.jacoco.enabled=true
quarkus.jacoco.report=true
quarkus.jacoco.generate-xml=true
quarkus.jacoco.report-location=jacoco-reports

%test.quarkus.jacoco.enabled=true
%test.quarkus.jacoco.report=true
%test.quarkus.jacoco.generate-xml=true
# Define exatamente onde o relatï¿½rio serï¿½ salvo
%test.quarkus.jacoco.report-location=target/jacoco-reports