_format_version: "3.0"
services:
  - name: cadastro-service
    url: http://host.docker.internal:8082
    routes:
      - name: rota-cadastro
        paths:
          - /api/pessoas
          - /api/perfil
        strip_path: false

  - name: transferencia-service
    url: http://host.docker.internal:8083
    routes:
      - name: rota-transferencias
        paths:
          - /api/contas
          - /transferencias
        strip_path: false

plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid
      echo_downstream: true