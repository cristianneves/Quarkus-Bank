# ==========================================================
# ? CONFIGURAï¿½ï¿½ES GERAIS E REDE
# ==========================================================
quarkus.http.port=8083
# No teste, mantemos a mesma porta para consistï¿½ncia
%test.quarkus.http.port=8083

# Jackson: Evita erro se um DTO estiver vazio
quarkus.jackson.fail-on-empty-beans=false

# ==========================================================
# ? BANCO DE DADOS (PERFIL DEV - POSTMAN)
# ==========================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASS}

# Vault (Segredos)
quarkus.vault.url=${VAULT_URL:http://localhost:8200}
quarkus.vault.authentication.client-token=${VAULT_TOKEN:}
quarkus.vault.secret-config-kv-path=quarkus-bank

%test.quarkus.vault.secret-config-kv-path=
%test.quarkus.vault.url=
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/transferencia_db

#quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.database.generation.halt-in-production=true
quarkus.hibernate-orm.log.sql=false

# Ativa o FLYWAY
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1.0.0


# ==========================================================
# ? BANCO DE DADOS (PERFIL TEST - JUNIT/PIPELINE)
# Forï¿½a o Flyway a rodar ANTES dos testes
%test.quarkus.flyway.migrate-at-start=true

# Garante que o banco de teste seja limpo e recriado do zero para cada bateria
%test.quarkus.flyway.clean-at-start=true

# OBRIGATï¿½RIO: Permite que o Flyway apague o banco de teste (proteï¿½ï¿½o de seguranï¿½a)
%test.quarkus.flyway.clean-disabled=false

# Impede o Hibernate de tentar criar tabelas, ele deve apenas usar o que o Flyway criou
%test.quarkus.hibernate-orm.database.generation=none

# ==========================================================
# ? SEGURANï¿½A (KEYCLOAK)
# ==========================================================
quarkus.oidc.auth-server-url=${KC_URL:http://localhost:8180}/realms/bank-realm
quarkus.oidc.client-id=quarkus-app
quarkus.oidc.application-type=service
quarkus.oidc.roles.role-claim-path=realm_access/roles

# Diz ao Quarkus que o Principal Name deve ser o UUID (sub) e nï¿½o o e-mail
quarkus.oidc.principal-claim=sub

# Debug de seguranï¿½a para facilitar sua vida
quarkus.log.category."io.quarkus.oidc.runtime.OidcProvider".level=DEBUG
quarkus.log.category."io.quarkus.oidc.runtime.OidcAuthenticator".level=DEBUG

# Desativa a validaï¿½ï¿½o proativa do OIDC real nos testes,
# permitindo que o @TestSecurity assuma o controle total.
%test.quarkus.oidc.enabled=false

# ==========================================================
# ? MENSAGERIA (KAFKA)
# ==========================================================
kafka.bootstrap.servers=${KAFKA_URL:localhost:9092}
mp.messaging.connector.smallrye-kafka.bootstrap.servers=${KAFKA_URL:localhost:9092}
quarkus.kafka.snappy.enabled=false

# --- CANAL: pessoa-registrada (Incoming) ---
mp.messaging.incoming.pessoa-registrada.connector=smallrye-kafka
mp.messaging.incoming.pessoa-registrada.topic=v2-pessoa-registrada
mp.messaging.incoming.pessoa-registrada.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.pessoa-registrada.failure-strategy=dead-letter-queue
mp.messaging.incoming.pessoa-registrada.dead-letter-queue.topic=pessoa-registrada-dlq

# No teste, o Kafka vira memï¿½ria
%test.mp.messaging.incoming.pessoa-registrada.connector=smallrye-in-memory
%test.mp.messaging.outgoing.pessoa-registrada-dlq.connector=smallrye-in-memory
mp.messaging.incoming.pessoa-registrada.dead-letter-queue.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# --- CANAL: transferencias-concluidas (Outgoing) ---
mp.messaging.outgoing.transferencias-concluidas.connector=smallrye-kafka
mp.messaging.outgoing.transferencias-concluidas.topic=transacoes-bb
mp.messaging.outgoing.transferencias-concluidas.value.serializer=org.apache.kafka.common.serialization.StringSerializer
# No teste, o Kafka vira memï¿½ria
%test.mp.messaging.outgoing.transferencias-concluidas.connector=smallrye-in-memory

quarkus.log.console.format=%d{HH:mm:ss} %-5p [cid=%X{correlationId}] (%t) %s%e%n

# ==========================================================
# ? QUALIDADE (SONAR & JACOCO)
# ==========================================================
quarkus.jacoco.report-location=jacoco-reports
sonar.java.binaries=target/classes
sonar.junit.reportPaths=target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=target/jacoco-reports/jacoco.xml

quarkus.oidc.token.principal-claim=sub

%test.quarkus.scheduler.enabled=false